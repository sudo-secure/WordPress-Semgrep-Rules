rules:
  - id: detect-phpcs-ignore-wordpress-extended
    languages:
      - php
    message: phpcs:ignore WordPress
    severity: WARNING
    patterns:
      - pattern-regex: (?i)(^\s*(?://|/\*)\s*phpcs:ignore\s+WordPress(?:\.[A-Za-z0-9_]+)*(?:\s*,\s*|\s+)?(?:[A-Za-z0-9_.]+)*(?:\s*--.*)?\s*(?:\*/)?\s*$)
